# AoAмқҳ мөңмғҒмң„ Application
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/chopha66/k8s-platform.git
    targetRevision: master
    path: argocd/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true      # Gitм—җм„ң мӮӯм ңлҗң лҰ¬мҶҢмҠӨлҠ” нҒҙлҹ¬мҠӨн„°м—җм„ңлҸ„ м ңкұ°
      selfHeal: true   # мҲҳлҸҷ ліҖкІҪ(drift)мқ„ Git мғҒнғңлЎң мһҗлҸҷ ліөкө¬